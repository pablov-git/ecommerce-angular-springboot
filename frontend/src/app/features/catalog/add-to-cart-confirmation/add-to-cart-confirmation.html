<div
  class="confirmation-backdrop"
  role="dialog"
  aria-modal="true"
  aria-labelledby="add-confirmation-title"
  (click)="close()"
>
  <section class="confirmation-modal" (click)="$event.stopPropagation()">
    <button
      type="button"
      class="confirmation-close"
      aria-label="Close confirmation"
      (click)="close()"
    >
      ×
    </button>

    <div class="confirmation-icon" aria-hidden="true">✓</div>

    <h2 id="add-confirmation-title">Added to cart</h2>

    <div class="confirmation-product">
      <img
        [src]="product().imageUrl"
        [alt]="product().name"
      />

      <div>
        <strong>{{ product().name }}</strong>
        <span>Added to your shopping cart.</span>
      </div>
    </div>

    <div class="confirmation-actions">
      <button
        type="button"
        class="secondary-action"
        (click)="close()"
      >
        Continue shopping
      </button>

      <button
        type="button"
        class="primary-action"
        (click)="viewCart()"
      >
        View cart
      </button>
    </div>
  </section>
</div>
