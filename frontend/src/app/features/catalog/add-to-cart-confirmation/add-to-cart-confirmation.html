<div
  class="confirmation-backdrop"
  role="dialog"
  aria-modal="true"
  aria-label="Product added to cart"
  (click)="close()"
>
  <section class="confirmation-modal" (click)="$event.stopPropagation()">
    <button
      type="button"
      class="confirmation-close"
      aria-label="Close confirmation"
      (click)="close()"
    >
      ×
    </button>

    <div class="confirmation-icon">✓</div>

    <h2>Added to cart</h2>
    <p>
      <strong>{{ product().name }}</strong>
      has been added to your cart.
    </p>

    <div class="confirmation-actions">
      <button type="button" class="secondary-action" (click)="close()">
        Continue shopping
      </button>

      <button type="button" class="primary-action" (click)="viewCart()">
        View cart
      </button>
    </div>
  </section>
</div>
